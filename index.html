<script>
"use strict";
/* Основной код приложения добавляется вторым блоком (см. app.js) */
/* ===== снимок чистого исходника страницы (для сохранения файла) ===== */
var __TPL__ = '<!DOCTYPE html>\n' + document.documentElement.outerHTML;

var MS='/*DATA_'+'START*/', ME='/*DATA_'+'END*/';
var DATA=(function(){
  var t=document.getElementById('app-data').textContent;
  var i=t.indexOf(MS)+MS.length, j=t.indexOf(ME,i);

var PW=null, CONTACTS=null, dirty=false;
var REMOTE=(DATA&&DATA.stub===true), PPW=null, PUBBLOB=null, PPW_KEY='kassa_ppw_v13';
var YSEL=DATA.currentYear;
function Y(){
  for(var i=0;i<DATA.years.length;i++)if(DATA.years[i].id===YSEL)return DATA.years[i];
  return DATA.years[0];
}

var tab='sum', tTab='inc', kidQuery='', tQuery='';

/* ===== утилиты ===== */
function $(s){return document.querySelector(s);}
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){
  return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
function uid(){return 'x'+Math.random().toString(36).slice(2,9)+Date.now().toString(36);}
function todayISO(){var d=new Date();return d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2)+'-'+('0'+d.getDate()).slice(-2);}
function fmt(n){n=Math.round(n);var s=Math.abs(n).toLocaleString('ru-RU');return (n<0?'−':'')+s+'\u00A0₽';}
function dateRu(iso){if(!iso)return '';var p=iso.split('-');return p[2]+'.'+p[1]+'.'+p[0];}
function byName(a,b){return a.name.localeCompare(b.name,'ru');}
function toast(msg,ms){var r=$('#toast-root');r.innerHTML='<div class="toast">'+esc(msg)+'</div>';
  setTimeout(function(){r.innerHTML='';},ms||2600);}
function markDirty(){dirty=true;}
/* ===== отмена действий ===== */
var UNDO=[];
function snapshot(label){
  UNDO.push({label:label,data:JSON.stringify(DATA)});

function undo(){
  if(!UNDO.length){toast('Отменять нечего');return;}

function kidsActive(){return Y().children.filter(function(k){return k.active!==false;}).sort(byName);}

/* ===== главный рендер ===== */
function render(){
  document.title='Касса '+String(Y().className).replace(/[«»]/g,'"');
  var app=$('#app'), h='';
  h+='<header class="hero"><div class="wrap">';
  h+='<h1>💰 Касса класса '+esc(Y().className)+'</h1>';
  h+='<div class="sub">Учебный год '+esc(Y().year)+(DATA.meta.updated?' · <span class="updated">обновлено '+esc(DATA.meta.updated)+'</span>':'')+'</div>';
  h+='</div></header>';
  h+='<div class="wrap">';
  var isCur=(YSEL===DATA.currentYear);
  h+='<div class="balance-card'+(isCur?'':' arch')+'"><div class="lbl">'+
     (isCur?'Сейчас в кассе':'📁 Архив · остаток на конец года')+'</div><div class="val">'+fmt(cashTotal())+'</div>';
  if(!isCur)h+='<div class="mini"><span>Год закрыт, остаток перенесён в следующий</span></div>';
  if(!Y().expenses.length&&(Y().startBalance||0)!==0)
    h+='<div class="mini"><span>Перенос на начало года: <b>'+fmt(Y().startBalance||0)+'</b></span></div>';
  h+=
  '<div style="margin-top:10px"><select style="max-width:280px;display:inline-block" onchange="setYear(this.value)">'+
  DATA.years.map(function(y){return '<option value="'+y.id+'"'+(y.id===YSEL?' selected':'')+'>'+esc(y.className)+' · '+esc(y.year)+(y.id===DATA.currentYear?' — текущий':'')+'</option>';}).join('')+
  '</select></div></div>';

  artsActive().forEach(function(a){
    if(!a.notice||artSpent(a.id)>0)return;
    var parts=kidsActive().filter(function(k){return participates(a,k.id);});
    var full=0;parts.forEach(function(k){if(paidBy(k.id,a.id)>=rateFor(a,k.id))full++;});
    var rest=parts.length-full;
    h+='<div class="notice-card" onclick="openArt(\''+a.id+'\')">'+
       '<span class="nico">📣</span><div class="ntx"><b>Идёт сбор: '+esc(a.name)+'</b> — '+rateText(a)+' с человека'+
       '<div class="nsub"><span class="chip g">сдали: '+full+'</span> <span class="chip '+(rest?'r':'g')+'">'+(rest?'осталось: '+rest:'все сдали ✓')+'</span></div></div></div>';
  });
  h+='<div class="tabs">';
  h+=tabBtn('sum','📊 Сводка')+tabBtn('kids','👧 Взносы')+tabBtn('exp','🧾 Расходы')+tabBtn('adm','✎ Правка');
  h+='</div>';

  if(tab==='sum')h+=viewSummary();
  else if(tab==='kids')h+=viewKids();
  else if(tab==='exp')h+=viewExpenses();
  else h+=viewAdmin();

  h+='<footer>'+(REMOTE?'Данные обновляет казначей — страница всегда показывает свежую версию.':'Страница работает без интернета и обновляется вручную.')+
     '<div class="updated">Касса класса · сборка v'+(DATA.meta.build||1)+'.1'+
     (DATA.meta.keeper?' · '+esc(DATA.meta.keeper):'')+'</div></footer>';
  h+='</div>';

  if(dirty){
    h+='<div class="savebar"><div class="in"><div class="tx">⚠ Есть несохранённые изменения</div>';
    if(REMOTE){h+='<button class="btn grn" onclick="publishData()">☁️ Сохранить</button>';}
    else{h+='<button class="btn grn" onclick="saveFile()">💾 Сохранить файл</button>';
      if(DATA.pubSec&&PW)h+='<button class="btn sec" onclick="publishData()">☁️ Опубликовать</button>';}
    h+='</div></div>';
  }
  app.innerHTML=h;
}
function tabBtn(id,label){return '<button class="'+(tab===id?'on':'')+'" onclick="setTab(\''+id+'\')">'+label+'</button>';}
function setTab(t){tab=t;render();}

/* ===== СВОДКА ===== */
function viewSummary(){
  var h='';
  if(Y().startNote)h+='<div class="note">ℹ️ '+esc(Y().startNote)+'</div>';
  var dc=debtorsCount();
  h+='<div class="card"><h2>📌 Коротко</h2>';
  h+='<div class="row"><div class="nm">Детей в классе</div><span class="chip b">'+kidsActive().length+'</span></div>';
  h+='<div class="row"><div class="nm">Активных сборов</div><span class="chip b">'+artsActive().length+'</span></div>';
  h+='<div class="row"><div class="nm">Не сдали полностью</div><span class="chip '+(dc?'r':'g')+'">'+(dc?dc+' чел.':'все сдали ✓')+'</span></div>';
  h+='</div>';

  h+='<div class="card"><h2>🎯 Сборы: собрано и потрачено</h2>';
  var arts=artsActive();
  if(!arts.length)h+='<div class="empty">Сборы ещё не объявлены</div>';
  else h+='<div class="hint" style="margin-bottom:2px">Нажмите на сбор — откроется список, кто сдал, а кто нет.</div>';
  arts.forEach(function(a){
    var expected=0;kidsActive().forEach(function(k){if(participates(a,k.id))expected+=rateFor(a,k.id);});
    var got=artCollected(a.id), spent=artSpent(a.id);
    var pct=expected>0?Math.min(100,Math.round(got/expected*100)):0;
    h+='<div style="margin:12px 0 14px;cursor:pointer" onclick="openArt(\''+a.id+'\')">';
    h+='<div style="display:flex;justify-content:space-between;gap:8px"><b>'+(a.birthday?'🎂 ':'')+esc(a.name)+'</b>'+
       '<span class="chip a">'+rateText(a)+' / чел.</span></div>';
    h+='<div class="pbar'+(pct>=100?' done':'')+'"><i style="width:'+pct+'%"></i></div>';
    h+='<div class="art-meta"><span>Собрано '+fmt(got)+' из '+fmt(expected)+' ('+pct+'%)</span>'+
       '<span>Потрачено '+fmt(spent)+'</span><span>Остаток по статье <b>'+fmt(got-spent)+'</b></span></div>';
    h+='</div>';
  });
  h+='</div>';
  return h;
}

/* ===== ВЗНОСЫ (дети) ===== */
var kidsFilter='';
function viewKids(){
  var h='<div class="card"><h2>👧 Взносы по детям</h2>';
  h+='<label class="f">Что показать</label><select onchange="kidsFilterSet(this.value)">';
  h+='<option value=""'+(kidsFilter===''?' selected':'')+'>Общий итог по всем сборам</option>';
  artsActive().forEach(function(a){
    h+='<option value="'+a.id+'"'+(kidsFilter===a.id?' selected':'')+'>'+(a.birthday?'🎂 ':'')+esc(a.name)+' — '+rateText(a)+'</option>';
  });
  h+='</select>';
  h+='<div class="searchbox" style="margin-top:8px"><input placeholder="Поиск по фамилии…" value="'+esc(kidQuery)+'" oninput="kidSearch(this.value)"></div>';
  h+='<div id="kids-list">'+kidsListHTML()+'</div>';
  h+='<div class="hint">Нажмите на ребёнка, чтобы увидеть подробности по каждому сбору.</div></div>';
  return h;
}
function kidsFilterSet(v){
  kidsFilter=v;
  var el=document.getElementById('kids-list');
  if(el)el.innerHTML=kidsListHTML();
}
function kidSearch(v){
  kidQuery=v;
  var el=document.getElementById('kids-list');
  if(el)el.innerHTML=kidsListHTML();
}
function kidsListHTML(){
  var h='';
  var q=kidQuery.trim().toLowerCase();
  var list=kidsActive().filter(function(k){return !q||k.name.toLowerCase().indexOf(q)>=0;});
  var a=kidsFilter?artById(kidsFilter):null;
  if(a){
    var full=0,part=0,none=0;
    list.forEach(function(k){
      if(!participates(a,k.id))return;
      var p=paidBy(k.id,a.id),r=rateFor(a,k.id);
      if(p>=r)full++;else if(p>0)part++;else none++;
    });
    h+='<div class="btnrow" style="margin-bottom:6px">'+
       '<span class="chip g">сдали: '+full+'</span>'+
       (part?'<span class="chip a">частично: '+part+'</span>':'')+
       '<span class="chip '+(none?'r':'g')+'">не сдали: '+none+'</span></div>';
  }
  if(!list.length)h+='<div class="empty">Никого не нашлось</div>';
  list.forEach(function(k){
    var chip,sub;
    if(a){
      if(!participates(a,k.id)){chip='<span class="chip n">не участвует</span>';sub='';}
      else{
        var p=paidBy(k.id,a.id),r=rateFor(a,k.id);
        chip = p>=r ? '<span class="chip g">'+fmt(p)+' ✓'+(p>r?' переплата':'')+'</span>'
             : p>0 ? '<span class="chip a">долг '+fmt(r-p)+'</span>'
                   : '<span class="chip r">долг '+fmt(r)+'</span>';
        sub = (p>0&&p<r ? 'сдано '+fmt(p)+' из '+fmt(r) : '')+(a.alt?(p>0&&p<r?' · ':'')+tierLabel(a,k.id):'');
      }
    }else{
      var d=debtFor(k.id), paid=paidTotal(k.id);
      chip = d>0 ? '<span class="chip r">долг '+fmt(d)+'</span>'
           : d<0 ? '<span class="chip b">переплата '+fmt(-d)+'</span>'
                 : '<span class="chip g">всё сдано ✓</span>';
      sub = 'сдано за год: '+fmt(paid);
    }
    h+='<div class="row" onclick="openKid(\''+k.id+'\')" style="cursor:pointer">'+
       '<div class="nm">'+esc(k.name)+(sub?'<small>'+sub+'</small>':'')+'</div>'+chip+'</div>';
  });
  return h;
}
function openKid(id){
  var k=kidById(id); if(!k)return;
  var h='<h2>'+esc(k.name)+'<button class="x" onclick="closeModal()">✕</button></h2>';
  if(k.bday)h+='<div class="hint">🎂 День рождения: '+esc(k.bday)+'</div>';
  if(PW&&CONTACTS&&CONTACTS[id]){
    var c=CONTACTS[id];
    h+='<div class="kid-contact"><div>📞 '+esc(c.phone||'—')+'</div><div>💳 Перевод от: '+esc(c.from||'—')+'</div><div>🏦 Банк: '+esc(c.bank||'—')+'</div></div>';
  }
  h+='<h3>По сборам</h3>';
  artsActive().forEach(function(a){
    var chip;
    if(!participates(a,id))chip='<span class="chip n">не участвует</span>';
    else{
      var p=paidBy(id,a.id),r=rateFor(a,id);
      chip = p>=r ? '<span class="chip g">'+fmt(p)+' ✓'+(p>r?' (переплата)':'')+'</span>'
           : p>0 ? '<span class="chip a">'+fmt(p)+' из '+fmt(r)+'</span>'
                 : '<span class="chip r">не сдано</span>';
    }
    var gift=(a.birthday&&(a.gifts||[]).indexOf(id)>=0)?' <span class="chip b">🎁 подарок вручён</span>':'';
    h+='<div class="row"><div class="nm">'+(a.birthday?'🎂 ':'')+esc(a.name)+'</div><div>'+chip+gift+'</div></div>';
  });
  var hist=Y().incomes.filter(function(x){return x.child===id;})
    .sort(function(a,b){return b.date<a.date?-1:1;});
  h+='<h3>История платежей</h3>';
  if(!hist.length)h+='<div class="empty">Платежей пока нет</div>';
  hist.forEach(function(x){
    h+='<div class="exp-item"><div class="top"><span><span class="tag">'+esc(artName(x.article))+'</span>'+
       (x.method?'<span class="dt">'+esc(x.method)+'</span>':'')+'</span><span class="money pos">+'+fmt(x.amount)+'</span></div>'+
       '<div class="dt">'+dateRu(x.date)+'</div></div>';
  });
  showModal(h);
}

/* ===== карточка сбора: кто сдал ===== */
function openArt(id){
  var a=artById(id);if(!a)return;
  var kids=kidsActive(),full=[],part=[],none=[],out=[];
  kids.forEach(function(k){
    if(!participates(a,k.id)){out.push(k);return;}
    var p=paidBy(k.id,a.id),r=rateFor(a,k.id);
    if(p>=r)full.push({k:k,p:p,r:r});
    else if(p>0)part.push({k:k,p:p,r:r});
    else none.push({k:k,p:0,r:r});
  });
  var h='<h2>'+(a.birthday?'🎂 ':'')+esc(a.name)+'<button class="x" onclick="closeModal()">✕</button></h2>';
  h+='<div class="hint">Ставка '+rateText(a)+' с человека'+(a.active===false?' · сбор в архиве':'')+'</div>';
  h+='<div class="btnrow" style="margin:8px 0 4px">'+
     '<span class="chip g">сдали: '+full.length+'</span>'+
     '<span class="chip a">частично: '+part.length+'</span>'+
     '<span class="chip r">не сдали: '+none.length+'</span>'+
     (out.length?'<span class="chip n">не участвуют: '+out.length+'</span>':'')+'</div>';
  function block(title,arr,mk){
    if(!arr.length)return '';
    var t='<h3>'+title+'</h3>';
    arr.forEach(function(r){t+='<div class="row"><div class="nm">'+esc(r.k?r.k.name:r.name)+'</div>'+mk(r)+'</div>';});
    return t;
  }
  h+=block('❌ Не сдали ('+none.length+')',none,function(r){return '<span class="chip r">долг '+fmt(r.r)+'</span>';});
  h+=block('🕗 Сдали частично ('+part.length+')',part,function(r){return '<span class="chip a">сдано '+fmt(r.p)+' · долг '+fmt(r.r-r.p)+'</span>';});
  h+=block('✅ Сдали ('+full.length+')',full,function(r){return '<span class="chip g">'+fmt(r.p)+' ✓'+(r.p>r.r?' переплата':'')+'</span>';});
  if(a.alt){
    h+='<h3>💠 Разбивка по вариантам</h3>';
    [{lbl:tierName(a,false),price:a.rate,alt:false},{lbl:tierName(a,true),price:a.alt.rate,alt:true}].forEach(function(t){
      var grp=kids.filter(function(k){return participates(a,k.id)&&(((a.altKids||[]).indexOf(k.id)>=0)===t.alt);});
      h+='<div class="row"><div class="nm"><b>'+esc(t.lbl)+'</b> — '+fmt(t.price)+'</div><span class="chip b">'+grp.length+' чел.</span></div>';
      grp.forEach(function(k){
        var p=paidBy(k.id,a.id);
        h+='<div class="row" style="padding-left:14px"><div class="nm">'+esc(k.name)+'</div>'+
           (p>=t.price?'<span class="chip g">'+fmt(p)+' ✓</span>':p>0?'<span class="chip a">'+fmt(p)+'</span>':'<span class="chip r">не сдано</span>')+'</div>';
      });
    });
  }
  if(out.length){
    h+='<h3>— Не участвуют ('+out.length+')</h3>';
    out.forEach(function(k){h+='<div class="row"><div class="nm inactive">'+esc(k.name)+'</div><span class="chip n">не участвует</span></div>';});
  }
  showModal(h);
}

function tierName(a,isAlt){
  if(isAlt)return (a.alt&&a.alt.label)||'вариант 2';
  return a.label||'основной вариант';
}
function tierLabel(a,kidId){
  if(!a.alt)return '';
  return '💠 '+esc(tierName(a,(a.altKids||[]).indexOf(kidId)>=0));
}

/* ===== РАСХОДЫ ===== */
function viewExpenses(){
  var h='<div class="card"><h2>💼 Итоги года</h2>';
  h+='<div class="row"><div class="nm">Собрано за год</div><span class="money pos">+'+fmt(sumIncomes())+'</span></div>';
  h+='<div class="row"><div class="nm">Потрачено за год</div><span class="money neg">−'+fmt(sumExpenses())+'</span></div>';
  h+='<div class="row"><div class="nm">Перенос на начало года</div><span class="money">'+fmt(Y().startBalance||0)+'</span></div>';
  h+='<div class="row"><div class="nm"><b>Сейчас в кассе</b></div><span class="money" style="color:var(--acc)">'+fmt(cashTotal())+'</span></div>';
  h+='</div>';
  (Y().notes||[]).forEach(function(n){
    h+='<div class="note">ℹ️ <b>Справочно:</b> '+esc(n.text)+'</div>';
  });
  h+='<div class="card"><h2>📉 Расходы по статьям</h2>';
  var totals={},max=0;
  Y().expenses.forEach(function(x){totals[x.article||'']=(totals[x.article||'']||0)+x.amount;});
  var keys=Object.keys(totals).sort(function(a,b){return totals[b]-totals[a];});
  keys.forEach(function(k){if(totals[k]>max)max=totals[k];});
  if(!keys.length)h+='<div class="empty">Расходов пока не было</div>';
  keys.forEach(function(k){
    var w=max>0?Math.max(3,Math.round(totals[k]/max*100)):0;
    h+='<div class="bar-row"><div class="bl">'+esc(artName(k))+'</div>'+
       '<div class="bt"><i style="width:'+w+'%"></i></div><div class="bv">'+fmt(totals[k])+'</div></div>';
  });
  h+='</div>';

  h+='<div class="card"><h2>🧾 Все расходы</h2>';
  var list=Y().expenses.slice().sort(function(a,b){return a.date<b.date?1:-1;});
  if(!list.length)h+='<div class="empty">Список пуст — как только появятся траты, они будут здесь с датой и описанием</div>';
  list.forEach(function(x){
    h+='<div class="exp-item"><div class="top"><span><span class="tag">'+esc(artName(x.article))+'</span></span>'+
       '<span class="money neg">−'+fmt(x.amount)+'</span></div>'+
       '<div class="ds">'+esc(x.desc||'')+'</div><div class="dt">'+dateRu(x.date)+'</div></div>';
  });
  h+='</div>';
  return h;
}

/* ===== КАЗНАЧЕЙ ===== */
function viewAdmin(){
  if(!PW){
    return '<div class="card lockbox"><div class="ic">🔒</div><h2 style="justify-content:center">Правка данных</h2>'+
      '<p class="hint" style="margin-bottom:10px">Здесь вносятся приходы и расходы.<br>Для просмотра пароль не нужен.</p>'+
      '<div class="pwwrap" style="max-width:280px;margin:0 auto">'+
      '<input type="password" id="pw-in" placeholder="Пароль" onkeydown="if(event.key===\'Enter\')unlock()">'+
      '<button class="eye" onclick="togglePw(\'pw-in\',this)" title="показать/скрыть пароль">👁</button></div>'+
      '<br><button class="btn" style="margin-top:6px" onclick="unlock()">Войти</button>'+
      (DATA.defaultPw?'<div class="note" style="margin-top:12px;text-align:left">Пароль по умолчанию: <b>'+esc(DATA.defaultPw)+'</b>. Войдите и обязательно смените его в «⚙️ Настройки» — подсказка исчезнет.</div>':'')+
      '<div style="margin-top:10px"><a href="#" style="font-size:13px;color:var(--acc)" onclick="event.preventDefault();var d=document.getElementById(\'rec-box\');d.style.display=(d.style.display===\'none\'?\'block\':\'none\')">Забыли пароль?</a></div>'+
      '<div id="rec-box" style="display:none;max-width:280px;margin:10px auto 0">'+
      '<input id="rec-in" placeholder="Код восстановления" style="text-transform:uppercase">'+
      '<button class="btn sec" style="margin-top:8px" onclick="tryRecover()">Восстановить пароль</button></div></div>';
  }
  var h='<div class="subtabs">'+
    stBtn('inc','➕ Приход')+stBtn('out','➖ Расход')+stBtn('log','📒 Журнал')+
    stBtn('kid','👧 Дети')+stBtn('bd','🎂 ДР')+stBtn('art','📚 Сборы')+stBtn('set','⚙️ Настройки')+'</div>';
  h+='<div class="hint" style="margin-bottom:6px">Вы правите год: <b>'+esc(Y().className)+' '+esc(Y().year)+'</b>. Другой год выбирается наверху, под остатком кассы.</div>';
  if(UNDO.length)h+='<div style="margin-bottom:8px"><button class="btn sm gry" onclick="undo()">↩ Отменить: '+esc(UNDO[UNDO.length-1].label)+'</button></div>';
  if(tTab==='inc')h+=adminIncome();
  else if(tTab==='out')h+=adminExpense();
  else if(tTab==='log')h+=adminLog();
  else if(tTab==='kid')h+=adminKids();
  else if(tTab==='bd')h+=adminBirthdays();
  else if(tTab==='art')h+=adminArts();
  else h+=adminSettings();
  return h;
}
function stBtn(id,l){return '<button class="'+(tTab===id?'on':'')+'" onclick="tTab=\''+id+'\';render()">'+l+'</button>';}
function genRecCode(){
  var A='ABCDEFGHJKMNPQRSTUVWXYZ23456789',out='';
  var r=randBytes(12);
  for(var i=0;i<12;i++){if(i&&i%4===0)out+='-';out+=A[r[i]%A.length];}
  return out;
}
function setRecovery(code){
  DATA.recovery=encryptSecure(code,{pw:PW});
  DATA.recView=encryptSecure(PW,{code:code});
}
function showRecModal(code,intro){
  showModal('<h2>🔑 Код восстановления<button class="x" onclick="closeModal()">✕</button></h2>'+
    (intro?'<div class="hint">'+intro+'</div>':'')+
    '<div style="text-align:center;font-size:23px;font-weight:800;letter-spacing:2px;margin:14px 0;color:var(--acc)">'+esc(code)+'</div>'+
    '<div class="hint">Запишите код на бумаге и храните отдельно от пароля. Забудете пароль — на экране входа нажмите «Забыли пароль?» и введите этот код. Код хранится внутри файла, поэтому после его выдачи сохраните файл.</div>');
}
function showCurRec(){
  var r=DATA.recView?decryptSecure(PW,DATA.recView):null;
  if(!r||!r.code){toast('Код не найден — выдайте новый');return;}
  showRecModal(r.code,'Текущий код восстановления:');
}
function regenRec(){
  snapshot('новый код восстановления');
  var code=genRecCode();setRecovery(code);
  markDirty();render();showRecModal(code,'Старый код больше не действует. Новый код:');
}
function tryRecover(){
  var code=($('#rec-in').value||'').trim().toUpperCase();
  if(!code){toast('Введите код восстановления');return;}
  if(!DATA.recovery){toast('В этом файле код восстановления ещё не настроен');return;}
  toast('Проверяю код…',6000);
  setTimeout(function(){
    var r=decryptSecure(code,DATA.recovery);
    if(!r||!r.pw){toast('❌ Код не подходит');return;}
    var c=decryptSecure(r.pw,DATA.secure);
    if(!c){toast('Код устарел — пароль менялся. Нужен свежий код.');return;}
    PW=r.pw;CONTACTS=c;render();
    showModal('<h2>Пароль восстановлен ✅<button class="x" onclick="closeModal()">✕</button></h2>'+
      '<div class="hint">Ваш пароль:</div>'+
      '<div style="text-align:center;font-size:22px;font-weight:800;margin:12px 0">'+esc(r.pw)+'</div>'+
      '<div class="hint">Запишите его. Хотите сменить — «⚙️ Настройки», там же будет выдан и новый код восстановления.</div>');
  },30);
}
function togglePw(id,btn){

function unlock(){
  var pw=$('#pw-in').value;
  if(!pw){toast('Введите пароль');return;}
  toast('Проверяю пароль…',6000);
  setTimeout(function(){
    var c=decryptSecure(pw,DATA.secure);
    if(c===null){toast('❌ Неверный пароль');return;}
    PW=pw;CONTACTS=c;
    if(DATA.defaultPw&&pw!==DATA.defaultPw)delete DATA.defaultPw;
    render();toast('✅ Правка открыта');
    if(!DATA.recovery){var code=genRecCode();setRecovery(code);markDirty();render();
      showRecModal(code,'У этого файла ещё не было кода восстановления — вот он:');}

/* --- дни рождения по четвертям --- */
function quarterOf(bday){
  if(!bday||!/^\d{1,2}\.\d{1,2}$/.test(String(bday).trim()))return 'нет даты';
  var p=String(bday).trim().split('.'),v=(+p[1])*100+(+p[0]);
  if(v>=101&&v<=315)return '3 четверть';
  if(v>=316&&v<=531)return '4 четверть';
  if(v>=601&&v<=831)return 'лето';
  if(v>=901&&v<=1031)return '1 четверть';
  if(v>=1101&&v<=1231)return '2 четверть';
  return 'нет даты';
}
function bdayKey(k){
  if(!k.bday||!/^\d{1,2}\.\d{1,2}$/.test(String(k.bday).trim()))return 9999;
  var p=String(k.bday).trim().split('.');return (+p[1])*100+(+p[0]);
}
function adminBirthdays(){
  var bArt=null;
  artsActive().forEach(function(a){if(a.birthday&&!bArt)bArt=a;});
  var groups=['3 четверть','4 четверть','лето','1 четверть','2 четверть','нет даты'];
  var icons={'3 четверть':'❄️','4 четверть':'🌷','лето':'☀️','1 четверть':'🍁','2 четверть':'🎄','нет даты':'❔'};
  var h='<div class="card"><h2>🎂 Дни рождения по четвертям</h2>';
  h+='<div class="hint">Календарный порядок — с января.'+
     (bArt?' Галочка «🎁» — подарок вручён (сбор «'+esc(bArt.name)+'»).':' Отметки о подарках появятся, когда будет активный сбор на ДР.')+'</div>';
  groups.forEach(function(g){
    var list=kidsActive().filter(function(k){return quarterOf(k.bday)===g;})
      .sort(function(a,b){return bdayKey(a)-bdayKey(b);});
    if(!list.length)return;
    h+='<h3>'+icons[g]+' '+g+' <span class="chip b">'+list.length+' чел.</span></h3>';
    list.forEach(function(k){
      h+='<div class="checkrow">';
      if(bArt){
        h+='<input type="checkbox" title="подарок вручён" '+((bArt.gifts||[]).indexOf(k.id)>=0?'checked':'')+
           ' onchange="toggleGift(\''+bArt.id+'\',\''+k.id+'\',this.checked)">';
      }
      h+='<span style="flex:1">'+esc(k.name)+'</span><span class="chip a">🎂 '+esc(k.bday||'—')+'</span></div>';
    });
  });
  h+='</div>';
  return h;
}

/* ===== экспорт / импорт ===== */
function download(name,text,mime){
  var blob=new Blob([text],{type:(mime||'text/plain')+';charset=utf-8'});
  var a=document.createElement('a');
  a.href=URL.createObjectURL(blob);a.download=name;
  document.body.appendChild(a);a.click();
  setTimeout(function(){URL.revokeObjectURL(a.href);a.remove();},2000);
}
function baseName(){return 'Касса_'+Y().className.replace(/[«»\s]/g,'')+'_v'+(DATA.meta.build||1);}
function exportJSON(){
  download(baseName()+'_данные_'+todayISO()+'.json',JSON.stringify(DATA),'application/json');
  toast('Резервная копия скачана');
}
function csvCell(v){v=String(v==null?'':v);return /[;"\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v;}
function exportCSV(){
  var SEP=';',NL='\r\n',rows=[];
  var arts=artsActive();
  var head=['№','Ребёнок'];
  arts.forEach(function(a){head.push(a.name+' ('+(a.alt?a.rate+'/'+a.alt.rate:a.rate)+' р.)');});
  head.push('Итого сдано','Долг');
  rows.push(head);
  kidsActive().forEach(function(k,i){
    var r=[i+1,k.name];
    arts.forEach(function(a){r.push(participates(a,k.id)?paidBy(k.id,a.id):'не уч.');});
    r.push(paidTotal(k.id),debtFor(k.id));
    rows.push(r);
  });
  rows.push([]);
  rows.push(['РАСХОДЫ']);
  rows.push(['Дата','Статья','Сумма','Описание']);
  Y().expenses.slice().sort(function(a,b){return a.date<b.date?-1:1;}).forEach(function(x){
    rows.push([dateRu(x.date),artName(x.article),x.amount,x.desc||'']);
  });
  rows.push([]);
  rows.push(['ИТОГИ']);
  rows.push(['Перенос (стартовый баланс)',Y().startBalance||0]);
  rows.push(['Собрано за год',sumIncomes()]);
  rows.push(['Потрачено за год',sumExpenses()]);
  rows.push(['В кассе сейчас',cashTotal()]);
  var csv='\ufeff'+rows.map(function(r){return r.map(csvCell).join(SEP);}).join(NL);
  download(baseName()+'_'+String(Y().year).replace('/','-')+'_отчёт_'+todayISO()+'.csv',csv,'text/csv');
  toast('Таблица для Excel скачана');
}
function importFile(){
  var inp=document.getElementById('imp-file');
  if(!inp||!inp.files||!inp.files[0]){toast('Сначала выберите файл');return;}
  var rd=new FileReader();
  rd.onload=function(){parseImport(String(rd.result));};
  rd.onerror=function(){toast('Не удалось прочитать файл');};
  rd.readAsText(inp.files[0],'utf-8');
}

    startNote:'Стартовый баланс — остаток кассы, перенесённый из года «'+src.className+' '+src.year+'».',
    children:kids,articles:arts,incomes:[],expenses:[],notes:[]});
  DATA.currentYear=nid;YSEL=nid;
  markDirty();closeModal();render();toast('Год '+yl+' создан и сделан текущим');
}
function parseImport(t){
  var d=null;
  if(t.indexOf(MS)>=0){
    try{var i=t.indexOf(MS)+MS.length,j=t.indexOf(ME,i);d=JSON.parse(t.slice(i,j));}catch(e){}
  }else{
    try{d=JSON.parse(t);}catch(e){}
  }
  if(!d||!d.secure){toast('❌ Это не похоже на файл кассы или резервную копию');return;}
  if(d.years&&d.years.length){ /* новый многолетний формат: полная замена */
    if(!confirm('Заменить ВСЕ данные (все годы) данными из выбранного файла?'))return;
    snapshot('импорт данных');
    var build=Math.max(DATA.meta.build||1,d.meta&&d.meta.build||1);
    DATA=d;DATA.meta.build=build;YSEL=DATA.currentYear;
  }else if(d.children&&d.articles&&d.incomes&&d.expenses&&d.meta){ /* старый формат одного года */
    var yl=d.meta.year||'?',cl=d.meta.className||'?';
    if(!confirm('Файл старого формата: год «'+cl+', '+yl+'». Обновить/добавить этот год, сохранив остальные годы?'))return;
    snapshot('импорт года '+yl);
    var yr={className:cl,year:yl,startBalance:d.meta.startBalance||0,startNote:d.meta.startNote||'',
      children:d.children,articles:d.articles,incomes:d.incomes,expenses:d.expenses,notes:d.notes||[]};
    var hit=null;
    DATA.years.forEach(function(y){if(y.year===yl&&y.className===cl)hit=y;});
    if(hit){yr.id=hit.id;DATA.years[DATA.years.indexOf(hit)]=yr;}
    else{yr.id=uid();DATA.years.push(yr);}
    DATA.secure=d.secure;
    delete DATA.recovery;delete DATA.recView;delete DATA.defaultPw;
    DATA.meta.build=Math.max(DATA.meta.build||1,d.meta.build||1);
    DATA.currentYear=yr.id;YSEL=yr.id;
  }else{toast('❌ Это не похоже на файл кассы или резервную копию');return;}
  markDirty();
  var c=PW?decryptSecure(PW,DATA.secure):null;
  if(c){CONTACTS=c;toast('✅ Данные импортированы');}
  else{PW=null;CONTACTS=null;tab='adm';toast('Данные импортированы. У этого файла свой пароль — войдите в правку заново.',5500);}
  render();
}

/* ===== сохранение файла ===== */
function saveFile(){
  DATA.meta.updated=dateRu(todayISO());
  var json=JSON.stringify(DATA).replace(/</g,'\\u003c');
  var i=__TPL__.indexOf(MS)+MS.length, j=__TPL__.indexOf(ME,i);

window.addEventListener('beforeunload',function(e){
  if(dirty){e.preventDefault();e.returnValue='';}
});

/* ===== модалки ===== */
function showModal(inner){
  $('#modal-root').innerHTML='<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal">'+inner+'</div></div>';
}
function closeModal(){$('#modal-root').innerHTML='';render();}


/* ===== v13: интернет-режим (GitHub Pages) ===== */
function refetchData(){
  if(!REMOTE||!PPW||PW||dirty)return; /* казначей в правке или есть несохранённое — не трогаем */
  var x=new XMLHttpRequest();
  x.open('GET','data.json?ts='+Date.now(),true);
  x.onreadystatechange=function(){
    if(x.readyState!==4||x.status<200||x.status>=300)return;
    var p=null;try{p=JSON.parse(x.responseText);}catch(e){}
    if(!p||!p.pub)return;
    var d=decryptSecure(PPW,p.pub);
    if(!d)return;
    if(JSON.stringify(d)!==JSON.stringify(DATA)){
      PUBBLOB=p.pub;DATA=d;
      var ids=DATA.years.map(function(y){return y.id;});
      if(ids.indexOf(YSEL)<0)initYear();
      render();toast('🔄 Данные обновились');
    }
  };
  try{x.send();}catch(e){}
}
document.addEventListener('visibilitychange',function(){if(!document.hidden)refetchData();});
window.addEventListener('focus',refetchData);
function initYear(){
  var ids=DATA.years.map(function(y){return y.id;});
  YSEL=(DATA.currentYear&&ids.indexOf(DATA.currentYear)>=0)?DATA.currentYear:ids[ids.length-1];
}
function pubUrl(){
  var gh=DATA.gh;if(!gh||!gh.owner)return '';
  return 'https://'+gh.owner+'.github.io'+((gh.repo===gh.owner+'.github.io')?'':'/'+gh.repo)+'/';
}
function boot(){
  if(!REMOTE){render();return;}
  renderWait('Загружаю данные…');
  var x=new XMLHttpRequest();
  x.open('GET','data.json?ts='+Date.now(),true);
  x.onreadystatechange=function(){
    if(x.readyState!==4)return;
    if(x.status>=200&&x.status<300){
      var parsed=null;try{parsed=JSON.parse(x.responseText);}catch(e){}
      if(!parsed||!parsed.pub){renderGate('Файл данных повреждён. Сообщите казначею.');return;}
      PUBBLOB=parsed.pub;
      var saved=null;try{saved=localStorage.getItem(PPW_KEY);}catch(e){}
      if(saved){var d=decryptSecure(saved,PUBBLOB);
        if(d){DATA=d;PPW=saved;initYear();render();return;}
        try{localStorage.removeItem(PPW_KEY);}catch(e){}}
      renderGate();
    }else{renderGate('Не удалось загрузить данные (код '+x.status+'). Проверьте интернет.',true);}
  };
  x.send();
}
function renderWait(msg){
  $('#app').innerHTML='<div class="gate"><div class="gcard"><div style="font-size:44px">💰</div>'+
    '<h2 style="margin:10px 0">Касса класса</h2><div class="hint">'+esc(msg)+'</div></div></div>';
}
function renderGate(err,retry){
  var h='<div class="gate"><div class="gcard">';
  h+='<div style="font-size:44px">💰</div><h2 style="margin:8px 0 2px">Касса класса</h2>';
  h+='<div class="hint" style="margin-bottom:14px">Введите пароль класса — его сообщает родительский комитет.</div>';
  if(err)h+='<div class="note" style="text-align:left;margin-bottom:10px">'+esc(err)+'</div>';
  if(retry){h+='<button class="btn wide" onclick="boot()">Повторить</button></div></div>';$('#app').innerHTML=h;return;}
  h+='<label class="f">Пароль класса</label>'+
     '<input id="ppw-in" type="password" autocomplete="current-password" onkeydown="if(event.key===\'Enter\')openParent()">';
  h+='<label style="display:flex;align-items:center;gap:8px;margin:12px 0;font-size:14px;justify-content:center">'+
     '<input type="checkbox" id="ppw-rem" checked style="width:auto"> Запомнить на этом устройстве</label>';
  h+='<button class="btn wide" onclick="openParent()">Открыть кассу</button>';
  h+='</div></div>';
  $('#app').innerHTML=h;
}
function openParent(){
  var pw=($('#ppw-in').value||'');
  if(!pw){toast('Введите пароль');return;}
  toast('Открываю…',6000);
  setTimeout(function(){
    var d=decryptSecure(pw,PUBBLOB);
    if(!d){toast('❌ Неверный пароль');return;}
    DATA=d;PPW=pw;initYear();
    var rem=$('#ppw-rem');
    if(rem&&rem.checked){try{localStorage.setItem(PPW_KEY,pw);}catch(e){}}
    render();
  },30);
}
/* --- GitHub API --- */
function ghApi(method,path,tok,body,cb){
  var x=new XMLHttpRequest();
  x.open(method,'https://api.github.com'+path,true);
  x.setRequestHeader('Accept','application/vnd.github+json');
  x.setRequestHeader('Authorization','Bearer '+tok);
  if(body)x.setRequestHeader('Content-Type','application/json');
  x.onreadystatechange=function(){if(x.readyState===4){var r=null;try{r=JSON.parse(x.responseText);}catch(e){}cb(x.status,r);}};
  try{x.send(body?JSON.stringify(body):null);}catch(e){cb(0,null);}
}
function getPubCfg(){
  if(!PW||!DATA.pubSec)return null;
  return decryptSecure(PW,DATA.pubSec);
}
function ghPutFile(cfg,path,contentStr,msg,done,attempt){
  var gh=DATA.gh,api='/repos/'+gh.owner+'/'+gh.repo+'/contents/'+path;
  /* &t= обходит минутный кэш GitHub, иначе можно получить устаревший sha и конфликт 409 */
  ghApi('GET',api+'?ref='+gh.branch+'&t='+Date.now(),cfg.token,null,function(st,r){
    var body={message:msg,content:b64enc(utf8(contentStr)),branch:gh.branch};
    if(st===200&&r&&r.sha)body.sha=r.sha;
    ghApi('PUT',api,cfg.token,body,function(st2,r2){
      if((st2===409||st2===422)&&!attempt){ /* конфликт версий — обновляем sha и пробуем ещё раз */
        setTimeout(function(){ghPutFile(cfg,path,contentStr,msg,done,1);},1500);return;}
      done(st2===200||st2===201,st2);
    });
  });
}
function publishData(done){
  var cfg=getPubCfg();
  if(!cfg){toast('Публикация не настроена — откройте «☁️ Публикация» в настройках');return;}
  var ppw=PPW||cfg.ppw;
  if(!ppw){toast('Не задан пароль класса');return;}
  toast('Публикую…',8000);
  DATA.meta.updated=dateRu(todayISO());
  var payload=JSON.stringify({v:13,pub:encryptSecure(ppw,DATA)});
  ghPutFile(cfg,'data.json',payload,'обновление данных кассы',function(ok,st){
    if(ok){dirty=false;render();toast('✅ Опубликовано! Родители увидят свежие данные при следующем открытии.',5000);}
    else if(st===401||st===403){toast('❌ GitHub не принял ключ доступа ('+st+'). Проверьте токен в «☁️ Публикация».',7000);}
    else if(st===404){toast('❌ Репозиторий не найден. Проверьте логин и название в «☁️ Публикация».',7000);}
    else{toast('❌ Ошибка публикации (код '+st+'). Проверьте интернет.',7000);}
    if(done)done(ok);
  });
}
function shellHtml(){
  var i=__TPL__.indexOf(MS)+MS.length, j=__TPL__.indexOf(ME,i);
  return __TPL__.slice(0,i)+'{"stub":true}'+__TPL__.slice(j);
}
function pubWizard(){
  if(!PW){toast('Сначала войдите в правку');return;}
  var gh=DATA.gh||{owner:'',repo:'',branch:'main'};
  var has=!!DATA.pubSec;
  var h='<h2>☁️ Публикация в интернете<button class="x" onclick="closeModal()">✕</button></h2>';
  h+='<div class="hint">Разовая настройка: аккаунт GitHub, репозиторий и токен доступа. Дальше кнопка «☁️ Сохранить» будет обновлять сайт сама.</div>';
  h+='<label class="f">Логин GitHub</label><input id="gh-o" value="'+esc(gh.owner)+'" autocapitalize="off">';
  h+='<label class="f">Название репозитория</label><input id="gh-r" value="'+esc(gh.repo)+'" placeholder="обычно: логин.github.io" autocapitalize="off">';
  h+='<label class="f">Токен доступа GitHub</label><input id="gh-t" type="password" placeholder="'+(has?'пусто — оставить прежний':'github_pat_…')+'">';
  h+='<label class="f">Пароль класса (для родителей)</label><input id="gh-p1" type="password" placeholder="'+(has?'пусто — оставить прежний':'придумайте простой общий пароль')+'">';
  h+='<label class="f">Пароль класса ещё раз</label><input id="gh-p2" type="password">';
  h+='<div class="btnrow" style="margin-top:12px"><button class="btn grn" onclick="pubGo(true)">🚀 Опубликовать сайт</button>'+
     (has?'<button class="btn sec" onclick="pubGo(false)">Сохранить настройки</button>':'')+'</div>';
  if(has&&gh.owner)h+='<div class="hint" style="margin-top:10px">Ссылка для родителей: <b style="word-break:break-all">'+esc(pubUrl())+'</b></div>';
  h+='<div class="hint" style="margin-top:8px">«Опубликовать сайт» загружает и страницу, и данные — используйте при первой настройке или после обновления версии кассы. Пароль класса скрывает все данные: без него страница ничего не показывает.</div>';
  showModal(h);
}
function pubGo(full){
  var o=$('#gh-o').value.trim(),r=$('#gh-r').value.trim();
  if(!o||!r){toast('Заполните логин и репозиторий');return;}
  var old=getPubCfg()||{};
  var tok=$('#gh-t').value.trim()||old.token||'';
  var p1=$('#gh-p1').value,p2=$('#gh-p2').value,ppw=old.ppw||'';
  if(p1){if(p1.length<4){toast('Пароль класса слишком короткий (мин. 4 символа)');return;}
    if(p1!==p2){toast('Пароли класса не совпадают');return;}ppw=p1;}
  if(!tok){toast('Нужен токен доступа GitHub');return;}
  if(!ppw){toast('Задайте пароль класса');return;}
  DATA.gh={owner:o,repo:r,branch:'main'};
  DATA.pubSec=encryptSecure(PW,{token:tok,ppw:ppw});
  markDirty();closeModal();
  if(!full){render();toast('Настройки сохранены. Теперь можно публиковать.');return;}
  var cfg={token:tok,ppw:ppw};
  if(REMOTE){pubDoAll(cfg,true);return;}
  /* публикуем из локального файла: сперва проверяем, нет ли на сайте более свежих данных */
  toast('Проверяю сайт…',8000);
  var gh=DATA.gh;
  ghApi('GET','/repos/'+gh.owner+'/'+gh.repo+'/contents/data.json?ref='+gh.branch+'&t='+Date.now(),cfg.token,null,function(st){
    if(st===200){
      PENDCFG=cfg;
      showModal('<h2>На сайте уже есть данные<button class="x" onclick="closeModal()">✕</button></h2>'+
        '<div class="hint">Касса уже публиковалась. Если после этого вы вносили платежи прямо на сайте (например, с телефона), там данные свежее, чем в этом файле.</div>'+
        '<div style="display:flex;flex-direction:column;gap:8px;margin-top:12px">'+
        '<button class="btn wide grn" onclick="pubKeepSite()">Оставить данные сайта — обновить только страницу</button>'+
        '<button class="btn wide sec" onclick="pubReplaceSite()">Заменить данными из этого файла</button></div>');
    }else{pubDoAll(cfg,true);}
  });
}
var PENDCFG=null;
function pubKeepSite(){closeModal();pubDoAll(PENDCFG,false);}
function pubReplaceSite(){closeModal();pubDoAll(PENDCFG,true);}
function pubDoAll(cfg,withData){
  toast('Публикую сайт… это займёт до минуты',12000);
  ghPutFile(cfg,'index.html',shellHtml(),'страница кассы (оболочка без данных)',function(ok1,st1){
    if(!ok1){render();toast('❌ Не удалось загрузить страницу (код '+st1+'). Проверьте логин, репозиторий и токен.',8000);return;}
    if(!withData){render();pubDoneModal('Страница обновлена, данные сайта не тронуты. Свежие данные и резервные копии теперь берите с самого сайта.');return;}
    DATA.meta.updated=dateRu(todayISO());
    var payload=JSON.stringify({v:13,pub:encryptSecure(cfg.ppw,DATA)});
    ghPutFile(cfg,'data.json',payload,'данные кассы (зашифрованы)',function(ok2,st2){
      render();
      if(!ok2){toast('❌ Страница загружена, но данные — нет (код '+st2+'). Повторите «Опубликовать сайт».',8000);return;}
      if(REMOTE)dirty=false;
      render();
      pubDoneModal('Первая публикация «поднимается» до 2–5 минут, потом обновления мгновенные. Сообщите родителям ссылку и пароль класса.'+
        (REMOTE?'':' Этот локальный файл тоже сохраните («💾 Сохранить файл»).'));
    });
  });
}
function pubDoneModal(note){
  showModal('<h2>Сайт опубликован 🎉<button class="x" onclick="closeModal()">✕</button></h2>'+
    '<div class="hint">Постоянная ссылка для родителей:</div>'+
    '<div style="text-align:center;font-size:17px;font-weight:800;margin:12px 0;word-break:break-all"><a href="'+esc(pubUrl())+'" target="_blank">'+esc(pubUrl())+'</a></div>'+
    '<div class="hint">'+note+'</div>');
}

boot();
